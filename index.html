  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"

  <style>
    /* Minimal resets for map container */
    html,
    body,
    #root {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    .leaflet-container {
      width: 100%;
      height: 100%;
      background: #f8fafc;
    }

    .dark .leaflet-container {
      background: #161717;
    }

    /* Remove default focus outline on Leaflet paths */
    path.leaflet-interactive:focus {
      outline: none;
    }

    /* Custom scrollbar for modal */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Dark mode scrollbar adjustments handled by Tailwind classes where possible, or defaults */
    .dark ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }

    /* Global Map Animations */
    @keyframes pulse-green {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0.8;
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
      }

      70% {
        transform: translate(-50%, -50%) scale(1.8);
        opacity: 0;
        box-shadow: 0 0 0 20px rgba(34, 197, 94, 0);
      }

      100% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0;
      }
    }

    @keyframes pulse-indigo {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0.8;
        box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
      }

      70% {
        transform: translate(-50%, -50%) scale(1.8);
        opacity: 0;
        box-shadow: 0 0 0 20px rgba(99, 102, 241, 0);
      }

      100% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0;
        box-shadow: 0 0 0 0 rgba(0, 0, 0, 0);
      }
    }

    @keyframes pulse-red {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0.8;
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }

      70% {
        transform: translate(-50%, -50%) scale(1.8);
        opacity: 0;
        box-shadow: 0 0 0 20px rgba(239, 68, 68, 0);
      }

      100% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0;
        box-shadow: 0 0 0 0 rgba(0, 0, 0, 0);
      }
    }

    /* Fluid Theme Transition */
    html.transitioning,
    html.transitioning *,
    html.transitioning *::before,
    html.transitioning *::after {
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, fill 0.3s ease, stroke 0.3s ease, box-shadow 0.3s ease !important;
      transition-delay: 0s !important;
    }

    .sidebar-mask {
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
    }

    /* Custom Leaflet Popup for pinned location */
    .pinned-location-popup .leaflet-popup-content-wrapper {
      background: transparent;
      border-radius: 12px;
      box-shadow: none;
      padding: 0;
      border: none;
    }

    .pinned-location-popup .leaflet-popup-content {
      margin: 0;
      width: auto !important;
      line-height: 1.4;
    }

    .pinned-location-popup .leaflet-popup-close-button {
      display: none;
    }

    .pinned-location-popup .leaflet-popup-tip-container {
      margin-top: -1px;
    }

    .pinned-location-popup .leaflet-popup-tip {
      background: #fff;
      box-shadow: none;
      border: 1px solid #e2e8f0;
      border-top: none;
      border-left: none;
    }

    .dark .pinned-location-popup .leaflet-popup-tip {
      background: #1a1d23;
      border-color: rgba(51, 65, 85, 0.3);
    }

    /* Dark mode map tiles - subtle inversion keeping colors readable */
    .dark-tiles {
      filter: brightness(0.7) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7);
    }

    .drawing-cursor .leaflet-container {
      cursor: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'%3E%3Cg fill='none' stroke-linecap='round'%3E%3Cg stroke='%23000' stroke-opacity='0.55' stroke-width='3'%3E%3Ccircle cx='16' cy='16' r='7'/%3E%3Cline x1='16' y1='2' x2='16' y2='8'/%3E%3Cline x1='16' y1='24' x2='16' y2='30'/%3E%3Cline x1='2' y1='16' x2='8' y2='16'/%3E%3Cline x1='24' y1='16' x2='30' y2='16'/%3E%3C/g%3E%3Cg stroke='white' stroke-width='1.4'%3E%3Ccircle cx='16' cy='16' r='7'/%3E%3Cline x1='16' y1='2' x2='16' y2='8'/%3E%3Cline x1='16' y1='24' x2='16' y2='30'/%3E%3Cline x1='2' y1='16' x2='8' y2='16'/%3E%3Cline x1='24' y1='16' x2='30' y2='16'/%3E%3C/g%3E%3C/g%3E%3Ccircle cx='16' cy='16' r='2' fill='%2310b981' stroke='white' stroke-width='0.8'/%3E%3C/svg%3E") 16 16, crosshair !important;
    }

    /* Marching ants animation for fiber light direction indicator. */
    @keyframes march-fiber-flow {
      from { background-position: 0 0; }
      to   { background-position: 6px 0; }
    }
    .fiber-flow {
      background-image: repeating-linear-gradient(90deg, currentColor 0 3px, transparent 3px 6px);
      background-size: 6px 100%;
      animation: march-fiber-flow 0.6s linear infinite;
      will-change: background-position;
    }
    .fiber-flow.reverse {
      animation-direction: reverse;
    }

    /* CTO label tooltip — small, legible, no chrome */
    .leaflet-tooltip.cto-label {
      background: rgba(15, 23, 42, 0.85);
      color: #f8fafc;
      border: none;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.2;
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    .leaflet-tooltip.cto-label::before {
      display: none;
    }
    .leaflet-tooltip.cto-label.cto-label--selected {
      background: rgba(22, 163, 74, 0.95);
      color: #ffffff;
    }
    /* Instant hide when label toggle is off — affects only permanent labels;
       hover tooltips keep working since they don't carry the --permanent modifier */
    .leaflet-container.labels-off .leaflet-tooltip.cto-label--permanent:not(.cto-label--selected) {
      display: none;
    }
  </style>
